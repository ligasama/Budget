<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Budget</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="screen is-active" data-screen="budget">
        <div class="status-bar" aria-hidden="true">
          <strong>9:41</strong>
          <span class="system-icons">▮▮▮  Wi-Fi  ▰</span>
        </div>

        <header class="app-header">
          <div>
            <h1>首页 <span class="leaf-mark" aria-hidden="true"></span></h1>
          </div>
          <label class="month-control" aria-label="选择月份">
            <span class="month-pill">
              <strong id="monthText">2026年06月</strong>
              <span class="chevron">⌄</span>
            </span>
            <span class="calendar-button" aria-hidden="true">▣</span>
            <input id="monthInput" type="month">
          </label>
        </header>

        <section class="hero-card" aria-label="本月预算总览">
          <div class="hero-copy">
            <span id="monthLabel">6月预算剩余</span>
            <strong id="budgetLeft">¥0</strong>
            <button class="total-budget-link" data-nav="budget-settings" data-focus-target="#totalBudgetInput" type="button" aria-label="进入预算设置修改总预算">
              总预算
              <strong id="heroBudgetTotal">¥0</strong>
              <span class="chevron" aria-hidden="true">›</span>
            </button>
          </div>
          <img class="hero-art" src="assets/wallet-hero.png" alt="">
        </section>

        <section class="monthly-result-section" aria-label="本月概览">
          <div class="section-head">
            <h2>本月概览</h2>
          </div>
          <div class="overview-grid">
            <article class="overview-card cash-result">
              <h3>现金结余</h3>
              <strong id="cashBalanceTotal">¥0</strong>
              <div class="overview-divider" aria-hidden="true"></div>
              <div class="overview-breakdown">
                <span>
                  <em>收入</em>
                  <b id="overviewIncome">¥0</b>
                </span>
                <span>
                  <em>支出</em>
                  <b id="overviewExpense">¥0</b>
                </span>
                <span>
                  <em>投资</em>
                  <b id="overviewAssetTransfer">¥0</b>
                </span>
              </div>
            </article>
            <article class="overview-card asset-change-result">
              <h3>资产变化</h3>
              <strong id="assetChangeTotal">+¥0</strong>
              <div class="overview-divider" aria-hidden="true"></div>
              <div class="overview-breakdown">
                <span>
                  <em>投资盈亏</em>
                  <b id="investmentPnlTotal">+¥0</b>
                </span>
                <span>
                  <em>转入资产账户</em>
                  <b id="overviewAssetChangeTransfer">+¥0</b>
                </span>
                <span>
                  <em>转出资产账户</em>
                  <b id="overviewAssetTransferOut">¥0</b>
                </span>
              </div>
            </article>
          </div>
        </section>

        <section class="accounts-section" aria-label="预算账户">
          <div class="section-head">
            <h2>预算账户</h2>
            <button class="text-button" type="button" data-nav="me">管理账户 ›</button>
          </div>
          <div class="account-list" id="accountList"></div>
        </section>
      </section>

      <section class="screen secondary-screen" data-screen="ledger">
        <header class="simple-header">
          <button class="back-home-button" data-nav="budget" type="button" aria-label="返回首页">‹ 首页</button>
          <h1>流水</h1>
        </header>
        <div class="transaction-list" id="transactionList"></div>
      </section>

      <section class="screen secondary-screen" data-screen="charts">
        <header class="simple-header">
          <button class="back-home-button" data-nav="budget" type="button" aria-label="返回首页">‹ 首页</button>
          <h1>资产</h1>
        </header>
        <section class="card-section">
          <div class="bar-list" id="chartBars"></div>
        </section>
      </section>

      <section class="screen secondary-screen" data-screen="budget-settings">
        <header class="simple-header">
          <button class="back-home-button" data-nav="budget" type="button" aria-label="返回首页">‹ 首页</button>
          <h1>预算设置</h1>
        </header>
        <section class="card-section settings-form" aria-label="预算设置">
          <div class="section-head">
            <h2>预算设置</h2>
          </div>
          <label>
            <span>本月总预算</span>
            <input id="totalBudgetInput" type="number" min="0" step="100">
          </label>
          <div class="budget-style-picker" id="styleOptions" aria-label="选择预算风格"></div>
        </section>
        <section class="card-section style-section profile-style-section" aria-label="预算风格">
          <div class="section-head">
            <h2>预算风格</h2>
          </div>
          <div class="style-composer">
            <div class="style-chart-card">
              <div class="style-chart-stack">
                <div class="chart-wrap">
                  <div class="pie-chart" id="accountPie" role="img" aria-label="四个账户预算比例环形图"></div>
                  <div class="chart-center">
                    <span>预算总额</span>
                    <strong id="chartTotal">¥0</strong>
                  </div>
                </div>
              </div>
              <div class="legend-list" id="pieLegend"></div>
            </div>
          </div>
        </section>
      </section>

      <section class="screen secondary-screen" data-screen="me">
        <header class="simple-header">
          <button class="back-home-button" data-nav="budget" type="button" aria-label="返回首页">‹ 首页</button>
          <h1>管理账户</h1>
        </header>
        <section class="account-manager" id="accountManager" aria-label="四个账户细分内容"></section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item is-active" data-nav="budget" type="button">
        <span class="nav-icon">⌂</span>
        <span>首页</span>
      </button>
      <button class="nav-item" data-nav="ledger" type="button">
        <span class="nav-icon">▤</span>
        <span>流水</span>
      </button>
      <button class="quick-add" id="quickAddButton" type="button" aria-label="快速记账">+</button>
      <button class="nav-item" data-nav="charts" type="button">
        <span class="nav-icon">◷</span>
        <span>资产</span>
      </button>
      <button class="nav-item" data-nav="me" type="button">
        <span class="nav-icon">♙</span>
        <span>我的</span>
      </button>
    </nav>

    <div class="ratio-dialog" id="customRatioDialog" aria-hidden="true">
      <div class="ratio-dialog-backdrop" data-close-custom-ratio></div>
      <form class="ratio-dialog-panel" id="customRatioForm">
        <div class="sheet-head">
          <h2>自定义比例</h2>
          <button class="icon-button" type="button" data-close-custom-ratio aria-label="关闭">×</button>
        </div>
        <div class="ratio-editor custom-ratio-editor" id="customRatioEditor"></div>
        <button class="primary-button" type="submit">保存比例</button>
      </form>
    </div>

    <div class="sheet" id="entrySheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-sheet></div>
      <form class="entry-panel" id="entryForm">
        <div class="sheet-head">
          <h2>快速记账</h2>
          <button class="icon-button" type="button" data-close-sheet aria-label="关闭">×</button>
        </div>
        <div class="segmented">
          <button class="is-active" data-type-button="expense" type="button">支出</button>
          <button data-type-button="income" type="button">收入</button>
          <button data-type-button="investment" type="button">投资</button>
        </div>
        <div class="investment-type-field" id="investmentTypeField" hidden>
          <span>投资类型</span>
          <div class="choice-row" id="investmentTypeRow"></div>
        </div>
        <label>
          <span>金额</span>
          <input id="amountInput" type="number" min="0" step="0.01" inputmode="decimal" required>
        </label>
        <label class="amortization-field" id="amortizationField">
          <span>摊销周期</span>
          <div class="months-input">
            <input id="amortizationInput" type="number" min="1" max="120" step="1" value="1" inputmode="numeric">
            <b>个月</b>
          </div>
        </label>
        <label id="accountField">
          <span>账户</span>
          <select id="accountInput"></select>
        </label>
        <label id="categoryField">
          <span id="categoryLabel">分类</span>
          <select id="categoryInput"></select>
        </label>
        <label>
          <span>备注</span>
          <input id="noteInput" type="text" placeholder="可选">
        </label>
        <label>
          <span>日期</span>
          <input id="dateInput" type="date">
        </label>
        <p class="sheet-note" id="incomeAllocationNote"></p>
        <button class="primary-button" type="submit">完成</button>
      </form>
    </div>

    <script type="module" src="app.js?v=budget-fix3"></script>
  </body>
</html>
